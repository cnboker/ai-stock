# /etc/nginx/sites-available/backend
server {
    listen 80;
    server_name www.aoruite.top;
    # 强制跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.aoruite.top;

    # 证书文件路径
    ssl_certificate     /etc/nginx/ssl/aoruite/aoruite.top_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/aoruite/aoruite.top.key;


    # 优化安全配置
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;

    location / {
        proxy_pass http://127.0.0.1:8000; # 转发到你的 Docker 端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
   
}

# --- 2. 处理 Tauri 专用的 8081 端口 ---
server {
    listen 8081 ssl; # 建议 Tauri 也走加密通道
    server_name www.aoruite.top;

    # 复用相同的 SSL 证书
    ssl_certificate     /etc/nginx/ssl/aoruite/aoruite.top_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/aoruite/aoruite.top.key;

    # 针对 9081 端口的特殊逻辑（或直接转发到同一后端）
    location / {
        proxy_pass http://127.0.0.1:8000; # 转发到你的后端 API
        
        # --- 核心：处理 Tauri 的跨域问题 ---
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

