services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: aistock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # --- 修改点1：映射到主机目录 ---
      # 将数据库文件存放在当前目录下的 ./docker_data/postgres
      - /home/scott/docker_data/postgres:/var/lib/postgresql/data
   

  aistock:
    build: .
    restart: always
    ports:
      - "8080:8080"
    # 注意：这里使用了 --reload，配合下面的 volumes 映射，改代码确实不需要重启
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - .:/app
      # --- 修改点2：映射图片上传目录 ---
      # 将容器内的上传目录映射到主机的 ./static/uploads
      # 这样你在主机上就能直接看到按年月生成的子目录了
      - ./static/uploads:/app/static/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/aistock
    depends_on:
      - db

# 既然已经全部改成了路径映射，底部的根级 volumes: pgdata: 就可以删掉了